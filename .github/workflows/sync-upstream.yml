name: Sync from upstream

# Keeps this fork current with Muesli-HQ/muesli:
#   1. Fast-forwards the fork's pristine `main` to upstream (the "Sync fork" API).
#   2. Brings the updated `main` into `personal` (your integration branch / default):
#        - Clean merge  -> pushed straight to `personal` and the build is kicked.
#        - Conflict     -> opens (or reuses) a PR `main -> personal` to resolve by hand.
# Runs daily and on demand. `main` stays a clean mirror you cut upstream PRs from;
# `personal` is what CI builds into your app.

on:
  schedule:
    - cron: "0 7 * * *" # daily ~07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout personal (full history)
        uses: actions/checkout@v4
        with:
          ref: personal
          fetch-depth: 0

      - name: Sync fork main from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fast-forward this fork's `main` to the upstream parent's default branch.
          # Non-zero usually just means "already up to date" — don't fail the run.
          if gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch=main; then
            echo "main synced from upstream"
          else
            echo "merge-upstream returned non-zero (likely already up to date)"
          fi

      - name: Bring main into personal (auto-merge clean, PR on conflict)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main personal

          behind=$(git rev-list --count origin/personal..origin/main)
          if [ "$behind" -eq 0 ]; then
            echo "personal already contains main — nothing to sync."
            exit 0
          fi
          echo "personal is $behind commit(s) behind main; attempting merge."

          # Work on a fresh checkout of personal so the merge is against the pushed tip.
          git checkout -B personal origin/personal

          if git merge --no-edit origin/main; then
            git push origin HEAD:personal
            echo "Clean merge — pushed to personal."
            # GITHUB_TOKEN pushes don't trigger `on: push`, so kick the build explicitly.
            gh workflow run build-personal.yml --ref personal || true
            # A prior conflict PR is now obsolete — close it if one is open.
            PR=$(gh pr list --base personal --head main --state open --json number -q '.[0].number')
            if [ -n "$PR" ]; then
              gh pr close "$PR" --comment "Superseded — upstream now merges cleanly and was synced automatically." || true
            fi
            exit 0
          fi

          git merge --abort
          echo "Conflict merging main into personal — ensuring a sync PR is open."
          PR=$(gh pr list --base personal --head main --state open --json number -q '.[0].number')
          if [ -n "$PR" ]; then
            echo "Sync PR #$PR already open; GitHub keeps its diff current as main advances."
            exit 0
          fi

          BODY="$(mktemp)"
          cat > "$BODY" <<'EOF'
          Automated daily upstream sync. `main` (the clean upstream mirror) has changes
          that **conflict** with `personal`, so they need a manual merge.

          Resolve in the GitHub UI (if the conflicts are simple), or locally:

          ```
          git checkout personal
          git fetch origin
          git merge origin/main
          # resolve conflicts, then:
          git push origin personal
          ```

          Merging this PR — or pushing the resolved merge above — updates `personal`
          and triggers the build. This PR's diff refreshes automatically on later runs
          as `main` advances, so a single PR tracks the sync until it's resolved.
          EOF
          gh pr create --base personal --head main \
            --title "Sync upstream → personal" \
            --body-file "$BODY"
