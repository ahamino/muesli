name: Sync from upstream

# Keeps this fork current with Muesli-HQ/muesli:
#   1. Fast-forwards the fork's pristine `main` to upstream (the "Sync fork" API).
#   2. Brings the updated `main` into `personal` via a tested PR (never a direct push):
#        - Clean merge  -> pushes `bot/sync-upstream` and opens an auto-merging PR.
#        - Conflict     -> hands off to resolve-sync.yml (Claude) to resolve + PR.
# In both cases the PR only merges once CI (`ci-gate`) passes (branch protection).
# Runs daily and on demand. `main` stays a clean mirror you cut upstream PRs from;
# `personal` is your integration branch / default.

on:
  schedule:
    - cron: "0 7 * * *" # daily ~07:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

env:
  SYNC_BRANCH: bot/sync-upstream

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout personal (full history)
        uses: actions/checkout@v4
        with:
          ref: personal
          fetch-depth: 0

      - name: Sync fork main from upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Fast-forward this fork's `main` to the upstream parent's default branch.
          # Non-zero usually just means "already up to date" — don't fail the run.
          if gh api -X POST "repos/${{ github.repository }}/merge-upstream" -f branch=main; then
            echo "main synced from upstream"
          else
            echo "merge-upstream returned non-zero (likely already up to date)"
          fi

      - name: Sync into personal via a tested PR (resolver on conflict)
        env:
          GH_TOKEN: ${{ secrets.SYNC_PAT }}       # PAT so the PR fires ci.yml
          BOT_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # bot identity for dispatch/builds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main personal

          behind=$(git rev-list --count origin/personal..origin/main)
          if [ "$behind" -eq 0 ]; then
            echo "personal already contains main — nothing to sync."
            exit 0
          fi
          echo "personal is $behind commit(s) behind main; building $SYNC_BRANCH."

          git checkout -B "$SYNC_BRANCH" origin/personal
          if ! git merge --no-edit origin/main; then
            git merge --abort
            echo "Conflict — handing off to the resolver agent (Claude)."
            GH_TOKEN="$BOT_TOKEN" gh workflow run resolve-sync.yml --ref personal || true
            exit 0
          fi

          # Clean merge — push the branch and open an auto-merging, test-gated PR.
          git push --force-with-lease origin "HEAD:$SYNC_BRANCH"
          BODY="$(mktemp)"
          printf 'Automated upstream sync — merged **cleanly** (no conflicts). Brings %s upstream commit(s) into `personal`.\n\nAuto-merges once `ci-gate` passes.\n' "$behind" > "$BODY"

          PR=$(gh pr list --base personal --head "$SYNC_BRANCH" --state open --json number -q '.[0].number')
          if [ -z "$PR" ]; then
            URL=$(gh pr create --base personal --head "$SYNC_BRANCH" \
                    --title "Sync upstream → personal" --body-file "$BODY")
            PR=$(basename "$URL")
            echo "Opened PR #$PR"
            GH_TOKEN="$BOT_TOKEN" gh pr comment "$PR" \
              --body "🤖 Clean merge — **no conflicts**. No manual changes were made; this is a straight merge of $behind upstream commit(s) into \`personal\`." || true
          else
            gh pr edit "$PR" --body-file "$BODY"
            echo "Updated PR #$PR"
          fi
          gh pr merge "$PR" --auto --merge \
            || echo "Could not enable auto-merge — verify SYNC_PAT, allow_auto_merge, and branch protection."
